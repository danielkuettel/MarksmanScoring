name: SQLite Schema Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SQLite
        run: sudo apt-get install -y sqlite3

      - name: Run SQLite Tests
        run: |
          chmod +x tests/run_tests.sh
          tests/run_tests.sh
